<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  
  <title>Control de Stock</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass: rgba(0, 0, 0, 0.6);
      --glass-border: rgba(255, 255, 255, 0.15);
      --input-bg: rgba(0, 0, 0, 0.4);
      
      --accent: #FFD700; 
      --start: #4CAF50; /* Verde */
      --end: #FF5722;   /* Naranja */
      --error: #ff4444; /* Rojo */
      --info: #007bff;  /* Azul */
      
      --text-primary: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0; font-family: 'Inter', sans-serif; 
      color: var(--text-primary);
      background: radial-gradient(at 0% 0%, #1e053a 0%, transparent 50%),
                  radial-gradient(at 100% 0%, #310d5e 0%, transparent 50%),
                  radial-gradient(at 100% 100%, #0d031a 0%, transparent 50%),
                  radial-gradient(at 0% 100%, #214d7a 0%, transparent 50%);
      background-color: #0d031a;
      background-attachment: fixed;
      min-height: 100vh; padding: 20px;
      
      opacity: 0; transition: opacity 0.5s ease;
    }

    .header { text-align: center; margin-bottom: 20px; position: relative; }
    .header h3 { color: var(--accent); font-weight: 800; margin: 0; font-size: 24px; letter-spacing: -1px; }
    
    .container {
      max-width: 600px; margin: 0 auto; 
      background: var(--glass); 
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      padding: 20px; border-radius: 20px; border: 1px solid var(--glass-border);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    /* TARJETA DE ESTADO */
    .status-card {
        background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
        padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px;
    }
    .status-badge {
        display: inline-block; padding: 8px 16px; border-radius: 20px;
        font-weight: 800; text-transform: uppercase; font-size: 14px; margin-bottom: 5px;
    }
    .st-open { background: rgba(76, 175, 80, 0.2); color: var(--start); border: 1px solid var(--start); }
    .st-closed { background: rgba(255, 87, 34, 0.2); color: var(--end); border: 1px solid var(--end); }
    .status-msg { font-size: 12px; color: var(--text-muted); }

    /* FILAS DE STOCK */
    .stock-row { 
        background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid transparent;
    }
    .kilo-title { font-weight: 800; color: var(--accent); margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
    
    .comparison-wrapper { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .col-sys, .col-real { flex: 1; text-align: center; }
    
    label { display: block; font-size: 10px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }

    input {
        width: 100%; padding: 10px; background: var(--input-bg); border: 1px solid var(--glass-border);
        border-radius: 8px; color: white; text-align: center; font-weight: bold; font-size: 16px; outline: none;
    }
    
    .inp-sys { background: rgba(255,255,255,0.05); color: #aaa; border: 1px dashed #555; pointer-events: none; font-size: 14px; }
    
    .inp-real:focus { border-color: var(--accent); background: rgba(0,0,0,0.6); }
    .inp-real.match { border-color: var(--start); color: var(--start); background: rgba(76, 175, 80, 0.1); }
    .inp-real.diff { border-color: var(--error); color: var(--error); background: rgba(255, 68, 68, 0.1); }

    /* JUSTIFICACIÓN */
    #diffSection { display: none; margin-top: 20px; animation: slideDown 0.3s; background: rgba(255, 68, 68, 0.1); padding: 15px; border-radius: 12px; border: 1px solid var(--error); }
    textarea {
        width: 100%; height: 80px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
        border-radius: 8px; color: white; padding: 10px; margin-top: 5px; resize: none;
    }
    
    /* BOTONES */
    .btn-main {
        width: 100%; padding: 18px; border: none; border-radius: 12px; margin-top: 20px;
        font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .btn-start { background: linear-gradient(90deg, var(--start), #43A047); color: #000; }
    .btn-end { background: linear-gradient(90deg, var(--end), #D84315); color: white; }
    .btn-info { background: linear-gradient(90deg, #17a2b8, #0056b3); color: white; margin-top: 0; margin-bottom: 20px; }
    .btn-disabled { background: #444; color: #888; cursor: not-allowed; filter: grayscale(1); }
    
    .btn-magic {
        background: var(--accent); color: black; border: none; padding: 8px; 
        border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; margin-bottom: 20px;
        width: 100%; box-shadow: 0 4px 10px rgba(255, 215, 0, 0.2);
    }

    .btn-volver {
        background: transparent; border: 1px solid var(--glass-border); color: white;
        padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; font-weight: 600;
        transition: all 0.2s;
        position: absolute; left: 0; top: 0;
    }
    .btn-volver:hover { background: rgba(255,255,255,0.1); border-color: white; }

    @keyframes slideDown { from {opacity:0; transform:translateY(-10px);} to {opacity:1; transform:translateY(0);} }

    /* --- SISTEMA DE TOASTS --- */
    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { padding: 15px 20px; border-radius: 12px; color: #fff; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--glass-border); opacity: 0; transform: translateY(20px); transition: all 0.3s ease; font-size: 14px; letter-spacing: 0.5px;}
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: rgba(255, 68, 68, 0.9); backdrop-filter: blur(10px); }
    .toast.success { background: rgba(76, 175, 80, 0.9); backdrop-filter: blur(10px); }
    .toast.info { background: rgba(255, 215, 0, 0.9); color: #000; backdrop-filter: blur(10px); }

    /* --- ANIMACIÓN DE CARGA (OVERLAY) --- */
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(13, 3, 26, 0.9); z-index: 9999; display: flex; flex-direction: column;
      justify-content: center; align-items: center; 
      opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .loading-overlay.active { opacity: 1; visibility: visible; }
    
    .spinner {
      width: 60px; height: 60px; border: 4px solid rgba(255, 215, 0, 0.1);
      border-left-color: var(--accent); border-radius: 50%;
      animation: spin 1s linear infinite, pulseGlow 2s ease-in-out infinite;
      margin-bottom: 20px; transition: all 0.3s ease;
    }
    .spinner.success-mode { border-left-color: var(--start); }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes pulseGlow { 0% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); } 50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.4); } 100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); } }

    .loading-text { color: var(--accent); font-size: 15px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; transition: color 0.3s; }
    .loading-text.success-mode { color: var(--start); }

    /* ESTILOS DEL MODAL DE CAUCIONES */
    .caucion-tab-btn { flex: 1; padding: 12px; background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .caucion-tab-btn.active { background: var(--info); border-color: var(--info); }
    .caucion-card { background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); padding: 15px; margin-bottom: 10px; border-radius: 10px; }
    
  </style>
</head>
<body>

  <div id="toast-container"></div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner" id="loaderSpinner"></div>
    <div class="loading-text" id="loaderText">CARGANDO...</div>
  </div>

  <div class="header">
    <button class="btn-volver" id="btnBack">⬅ Volver</button>
    <h3>CONTROL DE STOCK</h3>
  </div>

  <div class="container">
    
    <div class="status-card">
        <div id="statusBadge" class="status-badge" style="border: 1px dashed #555; color: #aaa;">CONECTANDO...</div>
        <div id="statusText" class="status-msg">Verificando estado del turno...</div>
    </div>

    <button id="btnCauciones" class="btn-main btn-info" onclick="abrirModalCauciones()">📦 GESTIÓN DE CAUCIONES</button>

    <button id="btnMagic" class="btn-magic" style="display:none;" onclick="copiarSistemaAReal()">✨ TODO COINCIDE (COPIAR DATOS)</button>

    <div id="stockForm">
       </div>

    <div id="diffSection">
        <div style="color:var(--error); font-weight:bold; font-size:14px; margin-bottom:5px;">⚠️ HAY DIFERENCIAS DE STOCK</div>
        <div style="font-size:12px; color:#ddd;">Es obligatorio justificar el motivo para poder cerrar el turno.</div>
        <textarea id="txtMotivo" placeholder="Ej: Se rompió un envase de 10kg al bajar del camión..."></textarea>
    </div>

    <button id="btnAction" class="btn-main btn-disabled" disabled>ESPERANDO...</button>
  </div>

  <div id="modalCauciones" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center; padding: 20px;">
    <div class="modal-content" style="background:var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--glass-border); padding:20px; border-radius:20px; width:100%; max-width:600px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.8);">
      
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3 style="margin:0; color:var(--accent); font-weight:800;">📦 GESTIÓN CAUCIONES</h3>
        <button onclick="document.getElementById('modalCauciones').style.display='none'" style="background:rgba(255, 68, 68, 0.2); color:var(--error); border:1px solid var(--error); padding:5px 12px; border-radius:8px; cursor:pointer; font-weight:bold;">X</button>
      </div>

      <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button id="tabBtnNueva" class="caucion-tab-btn active" onclick="mostrarTabCaucion('NUEVA')">NUEVA CAUCIÓN</button>
        <button id="tabBtnActivas" class="caucion-tab-btn" onclick="mostrarTabCaucion('ACTIVAS')">COBRAR ACTIVAS</button>
      </div>

      <div id="tabCaucionNueva" style="display:block;">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
          <div>
            <label style="color:var(--text-primary);">Nombre del Cliente / Referencia:</label>
            <input type="text" id="cauNombre" placeholder="Ej: Juan Perez" style="text-align:left;">
          </div>
          <div>
            <label style="color:var(--text-primary);">Teléfono (Opcional):</label>
            <input type="text" id="cauTel" placeholder="Ej: 3804123456" style="text-align:left;">
          </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:15px; background:rgba(255,255,255,0.03); padding:15px; border-radius:12px;">
          <div>
            <label style="color:var(--accent);">Env. 10kg</label>
            <input type="number" id="cauE10" value="0" min="0">
          </div>
          <div>
            <label style="color:var(--accent);">Env. 15kg</label>
            <input type="number" id="cauE15" value="0" min="0">
          </div>
          <div>
            <label style="color:var(--accent);">Env. 45kg</label>
            <input type="number" id="cauE45" value="0" min="0">
          </div>
        </div>

        <div style="margin-bottom:20px;">
          <label style="color:var(--start); font-size:12px;">DINERO RECIBIDO (GARANTÍA): $</label>
          <input type="number" id="cauMonto" value="0" min="0" style="font-size:20px; color:var(--start); border-color:var(--start);">
        </div>

        <button onclick="guardarNuevaCaucion()" style="width:100%; padding:15px; background:linear-gradient(90deg, var(--start), #43A047); color:#000; border:none; border-radius:12px; font-size:16px; font-weight:800; cursor:pointer;">GUARDAR CAUCIÓN</button>
      </div>

      <div id="tabCaucionActivas" style="display:none;">
        <div id="listaCaucionesActivas" style="max-height: 350px; overflow-y: auto; padding-right:5px;">
          <p style="text-align:center; color:var(--text-muted);">Cargando cauciones vivas...</p>
        </div>
      </div>

      <div id="formCobroCaucion" style="display:none; background:rgba(255,255,255,0.05); padding:20px; border-radius:12px; margin-top:15px; border:1px solid var(--info);">
        <h4 id="cobroTitulo" style="margin-top:0; color:var(--info); border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">Devolución</h4>
        <input type="hidden" id="cobroId">
        <input type="hidden" id="max10"><input type="hidden" id="max15"><input type="hidden" id="max45">
        
        <p style="font-size:12px; color:var(--text-muted); margin-bottom:10px;">¿Cuántos envases devuelven físicamente?</p>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:15px;">
          <div><label style="color:white;">10kg (Max: <span id="lblMax10" style="color:var(--accent);"></span>)</label><input type="number" id="devE10" value="0" min="0"></div>
          <div><label style="color:white;">15kg (Max: <span id="lblMax15" style="color:var(--accent);"></span>)</label><input type="number" id="devE15" value="0" min="0"></div>
          <div><label style="color:white;">45kg (Max: <span id="lblMax45" style="color:var(--accent);"></span>)</label><input type="number" id="devE45" value="0" min="0"></div>
        </div>
        
        <div style="margin-bottom:20px;">
          <label style="color:var(--end); font-size:12px;">DINERO A DEVOLVER AL CLIENTE: $</label>
          <input type="number" id="devMonto" value="0" min="0" style="font-size:18px; color:var(--end); border-color:var(--end);">
          <small style="color:var(--text-muted); display:block; margin-top:5px;">Garantía original: $<span id="lblGarantiaOriginal"></span></small>
        </div>

        <div style="display:flex; gap:10px;">
          <button onclick="procesarCierreCaucion()" style="flex:2; padding:12px; background:linear-gradient(90deg, var(--start), #43A047); color:#000; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">CERRAR Y DEVOLVER</button>
          <button onclick="anularCaucionUI()" style="flex:1; padding:12px; background:rgba(255, 68, 68, 0.2); color:var(--error); border:1px solid var(--error); border-radius:8px; font-weight:bold; cursor:pointer;">ANULAR (Ctrl+Z)</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzi1x000HsPSQsWgz65jYWDWZI3cNQoKhoU5XCKagYcqs4en-d1YzO2sbnmzWlLIa9Vvw/exec";
    
    // Funciones visuales (Toast y Loader)
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3500);
    }

    function toggleLoader(show, text = 'CARGANDO...', isSuccess = false) {
        const overlay = document.getElementById('loadingOverlay');
        const loaderText = document.getElementById('loaderText');
        const spinner = document.getElementById('loaderSpinner');
        
        loaderText.textContent = text;
        
        if (isSuccess) {
            spinner.classList.add('success-mode');
            loaderText.classList.add('success-mode');
        } else {
            spinner.classList.remove('success-mode');
            loaderText.classList.remove('success-mode');
        }

        if (show) overlay.classList.add('active');
        else overlay.classList.remove('active');
    }

    // ==========================================
    // 🛡️ SEGURIDAD & SESIÓN 🛡️
    // ==========================================
    const params = new URLSearchParams(window.location.search);
    const k = params.get('k') || params.get('token') || sessionStorage.getItem('k');

    function expulsar() { 
        sessionStorage.clear(); 
        window.location.replace('index.html'); 
    }

    if (!k) {
        expulsar();
    } else {
        sessionStorage.setItem('k', k);
        if (window.history.replaceState) {
           window.history.replaceState({}, document.title, window.location.pathname);
        }
    }

    window.addEventListener('pageshow', (e) => { 
        if (e.persisted) window.location.reload(); 
    });

    // --- TIMER INVISIBLE (3 MINUTOS) ---
    let sessionTimeout = 180; 

    function startTimer() {
        setInterval(() => {
            sessionTimeout--;
            if(sessionTimeout <= 0) {
                showToast('⏱️ Inactividad detectada. Sesión cerrada.', 'error');
                setTimeout(expulsar, 1500); 
            }
        }, 1000);
    }

    function refreshSession() {
        sessionTimeout = 180;
    }

    ['click', 'mousemove', 'keydown', 'touchstart'].forEach(evt => {
        document.addEventListener(evt, refreshSession);
    });

    // ==========================================
    // 🧠 LÓGICA DE STOCK 🧠
    // ==========================================
    
    let currentMode = ''; 
    let systemValues = {}; 

    async function init() {
        startTimer(); 
        
        document.body.style.opacity = 1;
        toggleLoader(true, "VERIFICANDO ESTADO DEL TURNO...");

        try {
            const r = await fetch(`${SCRIPT_URL}?action=getstockstatus&k=${k}`);
            const d = await r.json();
            
            if(d.status === 'error' && d.message.includes('Sesión')) {
                expulsar();
                return;
            }

            setupUI(d);
            toggleLoader(false);
        } catch(e) { 
            expulsar(); 
        }
    }

    function setupUI(data) {
        const isClosed = data.estado === 'CERRADO';
        currentMode = isClosed ? 'INICIO' : 'CIERRE';
        
        const badge = document.getElementById('statusBadge');
        const txt = document.getElementById('statusText');
        const btn = document.getElementById('btnAction');
        
        if (isClosed) {
            badge.textContent = "TURNO CERRADO";
            badge.className = "status-badge st-closed";
            txt.textContent = "Ingrese el stock físico para INICIAR el turno.";
            btn.textContent = "GUARDAR INICIO 🟢";
            btn.className = "btn-main btn-start";
            
            renderGrid(data.sugerido || {}, false); 

        } else {
            badge.textContent = "TURNO ABIERTO";
            badge.className = "status-badge st-open";
            txt.textContent = "Auditoría: El sistema calculó el stock esperado.";
            btn.textContent = "GUARDAR CIERRE 🔴";
            btn.className = "btn-main btn-end";
            
            document.getElementById('btnMagic').style.display = 'block';
            
            systemValues = data.calculado; 
            renderGrid(systemValues, true); 
        }
        
        btn.disabled = false;
        btn.onclick = guardar;
    }

    function renderGrid(vals, isAudit) {
        const kilos = [10, 15, 45];
        const container = document.getElementById('stockForm');
        container.innerHTML = '';

        kilos.forEach(kg => {
            const lVal = vals[`L${kg}`] || 0;
            const vVal = vals[`V${kg}`] || 0;

            const html = `
            <div class="stock-row">
                <div class="kilo-title">${kg}<small>kg</small></div>
                
                <div style="margin-bottom:12px;">
                    <div style="font-size:11px; color:var(--start); margin-bottom:4px; font-weight:bold;">LLENOS</div>
                    <div class="comparison-wrapper">
                        ${isAudit ? `<div class="col-sys"><label>SISTEMA</label><input class="inp-sys" value="${lVal}" readonly></div>` : ''}
                        <div class="col-real"><label>REAL</label><input type="number" id="L${kg}" class="inp-real" placeholder="0" oninput="validar()" value="${isAudit ? '' : lVal}"></div>
                    </div>
                </div>

                <div>
                    <div style="font-size:11px; color:var(--accent); margin-bottom:4px; font-weight:bold;">VACÍOS</div>
                    <div class="comparison-wrapper">
                        ${isAudit ? `<div class="col-sys"><label>SISTEMA</label><input class="inp-sys" value="${vVal}" readonly></div>` : ''}
                        <div class="col-real"><label>REAL</label><input type="number" id="V${kg}" class="inp-real" placeholder="0" oninput="validar()" value="${isAudit ? '' : vVal}"></div>
                    </div>
                </div>
            </div>`;
            container.insertAdjacentHTML('beforeend', html);
        });
        
        validar(); 
    }

    function validar() {
        if (currentMode === 'INICIO') return; 

        let hasDiff = false;
        const inputs = document.querySelectorAll('.inp-real');
        
        inputs.forEach(inp => {
            const wrapper = inp.parentElement.parentElement;
            const sysInput = wrapper.querySelector('.inp-sys');
            
            if (sysInput) {
                const sysVal = Number(sysInput.value || 0);
                const realVal = Number(inp.value || 0);
                
                if (realVal !== sysVal) {
                    inp.classList.add('diff');
                    inp.classList.remove('match');
                    hasDiff = true;
                } else {
                    inp.classList.add('match');
                    inp.classList.remove('diff');
                }
            }
        });

        const diffSec = document.getElementById('diffSection');
        const btn = document.getElementById('btnAction');
        const motivo = document.getElementById('txtMotivo').value.trim();

        if (hasDiff) {
            diffSec.style.display = 'block';
            if (motivo.length < 5) {
                btn.disabled = true;
                btn.textContent = "JUSTIFIQUE LA DIFERENCIA...";
                btn.classList.add('btn-disabled');
            } else {
                btn.disabled = false;
                btn.textContent = "GUARDAR CON DIFERENCIA ⚠️";
                btn.classList.remove('btn-disabled');
            }
        } else {
            diffSec.style.display = 'none';
            btn.disabled = false;
            btn.textContent = "GUARDAR CIERRE ✅";
            btn.classList.remove('btn-disabled');
        }
    }
    
    document.getElementById('txtMotivo').addEventListener('input', validar);

    function copiarSistemaAReal() {
        if(!confirm("¿Copiar valores del sistema a Real? Úselo solo si ha verificado físicamente.")) return;
        
        [10,15,45].forEach(kilo => {
            document.getElementById(`L${kilo}`).value = systemValues[`L${kilo}`];
            document.getElementById(`V${kilo}`).value = systemValues[`V${kilo}`];
        });
        validar();
    }

    async function guardar() {
        const btn = document.getElementById('btnAction');
        btn.disabled = true; 
        
        toggleLoader(true, "PROCESANDO STOCK...");

        const hasDiff = document.getElementById('diffSection').style.display === 'block';
        const val = (id) => Number(document.getElementById(id).value) || 0;

        const payload = {
            action: 'savestock',
            k: k,
            tipo: currentMode,
            hasDiff: hasDiff,
            motivo: document.getElementById('txtMotivo').value,
            
            L10: val('L10'), V10: val('V10'),
            L15: val('L15'), V15: val('V15'),
            L45: val('L45'), V45: val('V45'),
            
            T10: val('L10')+val('V10'),
            T15: val('L15')+val('V15'),
            T45: val('L45')+val('V45')
        };

        const fd = new FormData();
        for(let key in payload) fd.append(key, payload[key]);

        try {
            const r = await fetch(SCRIPT_URL, { method:'POST', body:fd });
            const j = await r.json();
            if(j.status === 'success') {
                toggleLoader(true, `¡STOCK ${currentMode} REGISTRADO!`, true);
                setTimeout(() => {
                    window.location.replace(`inicio.html?k=${k}`);
                }, 1000);
            } else {
                throw new Error(j.message);
            }
        } catch(e) {
            toggleLoader(false);
            showToast("Error: " + e.message, "error");
            btn.disabled = false;
            btn.textContent = "REINTENTAR";
        }
    }
    
    document.getElementById('btnBack').onclick = () => window.location.replace(`inicio.html?k=${k}`);

    // ==========================================
    // 📦 MÓDULO DE CAUCIONES FRONTEND 📦
    // ==========================================

    function abrirModalCauciones() {
      document.getElementById('modalCauciones').style.display = 'flex';
      mostrarTabCaucion('NUEVA');
      cargarCaucionesActivas(); 
    }

    function mostrarTabCaucion(tab) {
      document.getElementById('tabCaucionNueva').style.display = tab === 'NUEVA' ? 'block' : 'none';
      document.getElementById('tabCaucionActivas').style.display = tab === 'ACTIVAS' ? 'block' : 'none';
      document.getElementById('formCobroCaucion').style.display = 'none'; 
      
      const btnNueva = document.getElementById('tabBtnNueva');
      const btnActivas = document.getElementById('tabBtnActivas');
      
      if(tab === 'NUEVA') {
        btnNueva.classList.add('active');
        btnActivas.classList.remove('active');
      } else {
        btnNueva.classList.remove('active');
        btnActivas.classList.add('active');
      }
    }

    async function guardarNuevaCaucion() {
      const nombre = document.getElementById('cauNombre').value.trim();
      const tel = document.getElementById('cauTel').value.trim();
      
      if (!nombre) {
        showToast("Debes ingresar un nombre o referencia del cliente.", "error");
        return;
      }

      const clienteFinal = tel ? `${nombre} - Tel:${tel}` : nombre;

      const env10 = Number(document.getElementById('cauE10').value) || 0;
      const env15 = Number(document.getElementById('cauE15').value) || 0;
      const env45 = Number(document.getElementById('cauE45').value) || 0;
      const monto = Number(document.getElementById('cauMonto').value) || 0;

      if (env10 === 0 && env15 === 0 && env45 === 0) {
        showToast("No estás prestando ningún envase.", "error");
        return;
      }

      try {
        toggleLoader(true, "Guardando Caución..."); 
        
        const body = new FormData();
        body.append('action', 'crearcaucion');
        body.append('k', k);
        body.append('cliente', clienteFinal);
        body.append('env10', env10);
        body.append('env15', env15);
        body.append('env45', env45);
        body.append('montoGarantia', monto);

        const res = await fetch(SCRIPT_URL, { method: 'POST', body });
        const json = await res.json();

        if (json.status === 'success') {
          showToast("Caución guardada con éxito", "success");
          
          document.getElementById('cauNombre').value = '';
          document.getElementById('cauTel').value = '';
          document.getElementById('cauE10').value = '0';
          document.getElementById('cauE15').value = '0';
          document.getElementById('cauE45').value = '0';
          document.getElementById('cauMonto').value = '0';
          
          cargarCaucionesActivas(); 
          mostrarTabCaucion('ACTIVAS'); 
        } else {
          showToast("Error: " + json.message, "error");
        }
      } catch(e) {
        showToast("Falló la conexión.", "error");
      } finally {
        toggleLoader(false);
      }
    }

    async function cargarCaucionesActivas() {
      const lista = document.getElementById('listaCaucionesActivas');
      lista.innerHTML = '<p style="text-align:center; color:var(--accent);">Cargando base de datos...</p>';
      
      try {
        const res = await fetch(`${SCRIPT_URL}?action=getcauciones&k=${k}`);
        const json = await res.json();
        
        if(json.status === 'success') {
          if(json.cauciones.length === 0) {
            lista.innerHTML = '<p style="text-align:center; color:var(--start);">No hay cauciones en la calle. Todo en orden.</p>';
            return;
          }

          let html = '';
          json.cauciones.forEach(c => {
            html += `
              <div class="caucion-card">
                <strong style="color:var(--accent); font-size:15px;">${c.cliente}</strong><br>
                <div style="font-size:12px; margin-top:5px; color:#ddd;">
                    Llevó: <b>${c.env10}</b>x10kg | <b>${c.env15}</b>x15kg | <b>${c.env45}</b>x45kg <br>
                    Garantía Guardada: <span style="color:var(--start); font-weight:bold;">$${c.monto}</span>
                </div>
                <button onclick="prepararCobro('${c.id}', ${c.env10}, ${c.env15}, ${c.env45}, ${c.monto})" style="margin-top:10px; width:100%; padding:8px; background:transparent; border:1px solid var(--info); color:var(--info); border-radius:5px; font-weight:bold; cursor:pointer;">DEVOLVER / COBRAR</button>
              </div>
            `;
          });
          lista.innerHTML = html;
        }
      } catch(e) {
        lista.innerHTML = '<p style="color:var(--error); text-align:center;">Error al cargar datos.</p>';
      }
    }

    function prepararCobro(id, e10, e15, e45, monto) {
      document.getElementById('formCobroCaucion').style.display = 'block';
      document.getElementById('cobroTitulo').innerText = `Cerrando: ${id}`;
      document.getElementById('cobroId').value = id;
      
      document.getElementById('max10').value = e10; document.getElementById('lblMax10').innerText = e10;
      document.getElementById('max15').value = e15; document.getElementById('lblMax15').innerText = e15;
      document.getElementById('max45').value = e45; document.getElementById('lblMax45').innerText = e45;
      document.getElementById('lblGarantiaOriginal').innerText = monto;

      document.getElementById('devE10').value = e10;
      document.getElementById('devE15').value = e15;
      document.getElementById('devE45').value = e45;
      document.getElementById('devMonto').value = monto;
      
      document.getElementById('formCobroCaucion').scrollIntoView({ behavior: 'smooth' });
    }

    async function procesarCierreCaucion() {
      const id = document.getElementById('cobroId').value;
      const d10 = Number(document.getElementById('devE10').value);
      const m10 = Number(document.getElementById('max10').value);
      const d15 = Number(document.getElementById('devE15').value);
      const m15 = Number(document.getElementById('max15').value);
      const d45 = Number(document.getElementById('devE45').value);
      const m45 = Number(document.getElementById('max45').value);
      const montoDevolver = Number(document.getElementById('devMonto').value);

      if(d10 > m10 || d15 > m15 || d45 > m45) {
        showToast("Error: El cliente no puede devolver más envases de los prestados.", "error");
        return;
      }

      if(confirm("¿Seguro que querés cerrar esta caución y devolver el dinero indicado?")) {
        try {
          toggleLoader(true, "Cerrando Caución...");
          const body = new FormData();
          body.append('action', 'cerrarcaucion');
          body.append('k', k);
          body.append('idCaucion', id);
          body.append('dev10', d10);
          body.append('dev15', d15);
          body.append('dev45', d45);
          body.append('montoDevuelto', montoDevolver);

          const res = await fetch(SCRIPT_URL, { method: 'POST', body });
          const json = await res.json();

          if(json.status === 'success') {
            showToast("Caución cerrada correctamente.", "success");
            document.getElementById('formCobroCaucion').style.display = 'none';
            cargarCaucionesActivas(); 
          } else {
            showToast("Falla: " + json.message, "error");
          }
        } catch(e) {
          showToast("Error de conexión.", "error");
        } finally {
          toggleLoader(false);
        }
      }
    }

    async function anularCaucionUI() {
      const id = document.getElementById('cobroId').value;
      if(confirm("ATENCIÓN: Esto anulará la caución asumiendo que el cliente no aceptó la mercadería. ¿Continuar?")) {
        try {
          toggleLoader(true, "Anulando...");
          const body = new FormData();
          body.append('action', 'anularcaucion');
          body.append('k', k);
          body.append('idCaucion', id);

          const res = await fetch(SCRIPT_URL, { method: 'POST', body });
          const json = await res.json();

          if(json.status === 'success') {
            showToast("Caución anulada con éxito.", "success");
            document.getElementById('formCobroCaucion').style.display = 'none';
            cargarCaucionesActivas();
          }
        } catch(e) {
          showToast("Error de red.", "error");
        } finally {
          toggleLoader(false);
        }
      }
    }

    init();
  </script>
</body>
</html>
