<!DOCTYPE html>
<html lang="es">
<head>

<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#ffffff">
<meta property="og:type" content="website">
<meta property="og:url" content="https://vmgas.vercel.app/">
<meta property="og:title" content="VM Gsd">
<meta property="og:description" content="Registro de Planta de Gas VM">
<meta property="og:image" content="https://vmgas.vercel.app/icon.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://vmgas.vercel.app/icon.jpg">


  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio de Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { 
      /* Variables del tema Dark Glass */
      --glass: rgba(0, 0, 0, 0.5);
      --glass-border: rgba(255, 255, 255, 0.15);
      --input-bg: rgba(0, 0, 0, 0.4);
      --text-primary: #ffffff;
      --accent: #FFD700;       /* Dorado para acciones */
      --error: #ff5e5e;        /* Rojo para errores */
      --success: #00C851;      /* Verde para éxito (Nuevo) */
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: center;
      
      /* Fondo Mesh Gradient (Mismo que el tablero) */
      background: radial-gradient(at 0% 0%, #1e053a 0%, transparent 50%),
                  radial-gradient(at 100% 0%, #310d5e 0%, transparent 50%),
                  radial-gradient(at 100% 100%, #0d031a 0%, transparent 50%),
                  radial-gradient(at 0% 100%, #214d7a 0%, transparent 50%);
      background-color: #0d031a; /* Fallback */
      background-attachment: fixed;
    }

    .login-box {
      /* Efecto Glassmorphism */
      background: var(--glass);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      
      padding: 40px 30px;
      border-radius: 30px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      transition: transform 0.3s ease;

      /* NUEVO: Para que la animación de carga no se salga de los bordes del recuadro */
      position: relative;
      overflow: hidden;
    }

    /* Pequeña animación de entrada */
    .login-box:hover {
      border-color: rgba(255, 255, 255, 0.25);
    }

    .login-logo { 
      width: 80px; 
      height: 80px; 
      margin: 0 auto 20px; 
      display: block; 
      border-radius: 20px; /* Bordes un poco más suaves */
      object-fit: cover; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .login-title { 
      color: var(--accent); 
      margin-bottom: 30px; 
      font-size: 26px; 
      font-weight: 700;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .input-field { 
      width: 100%; 
      height: 50px; 
      padding: 0 15px; 
      margin: 10px 0; 
      
      /* Estilo Input Dark Glass */
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      color: white;
      border-radius: 12px;
      font-size: 16px; 
      font-family: 'Inter', sans-serif;
      box-sizing: border-box; 
      outline: none;
      transition: all 0.3s ease;
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .input-field:focus {
      border-color: var(--accent);
      background: rgba(0, 0, 0, 0.6);
    }

    .password-container { 
      position: relative; 
      width: 100%;
    }

    .toggle-password { 
      position: absolute; 
      right: 15px; 
      top: 50%; 
      transform: translateY(-50%); 
      cursor: pointer; 
      user-select: none; 
      font-size: 18px; 
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .toggle-password:hover { opacity: 1; }

    .login-btn { 
      width: 100%; 
      height: 50px; 
      margin-top: 20px;
      
      /* Botón estilo Glass */
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--glass-border);
      color: #fff;
      font-size: 16px; 
      font-weight: 700; 
      letter-spacing: 1px;
      cursor: pointer; 
      border-radius: 12px;
      transition: all 0.3s ease;
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }

    .login-btn:hover { 
      background: var(--accent); 
      color: #000; /* Texto negro sobre dorado para contraste */
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
      border-color: var(--accent);
    }

    .login-btn:disabled {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.3);
      transform: none;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ELIMINAMOS .error-msg ORIGINAL PARA USAR LOS TOASTS */

    /* --- SISTEMA DE TOASTS (NUEVO) --- */
    #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { padding: 15px 20px; border-radius: 12px; color: #fff; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--glass-border); opacity: 0; transform: translateY(20px); transition: all 0.3s ease; font-size: 14px; letter-spacing: 0.5px;}
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: rgba(255, 94, 94, 0.9); backdrop-filter: blur(10px); }
    .toast.success { background: rgba(0, 200, 81, 0.9); backdrop-filter: blur(10px); }
    .toast.info { background: rgba(255, 215, 0, 0.9); color: #000; backdrop-filter: blur(10px); }

    /* --- ANIMACIÓN DE CARGA OVERLAY (NUEVO) --- */
    .loading-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(13, 3, 26, 0.85); z-index: 100; display: flex; flex-direction: column;
      justify-content: center; align-items: center; 
      opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .loading-overlay.active { opacity: 1; visibility: visible; }
    
    .spinner {
      width: 55px; height: 55px; border: 4px solid rgba(255, 215, 0, 0.1);
      border-left-color: var(--accent); border-radius: 50%;
      animation: spin 1s linear infinite, pulseGlow 2s ease-in-out infinite;
      margin-bottom: 20px; transition: all 0.3s ease;
    }
    .spinner.success-mode { border-left-color: var(--success); }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes pulseGlow { 0% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); } 50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); } 100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); } }

    .loading-text { color: var(--accent); font-size: 15px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; transition: color 0.3s; }
    .loading-text.success-mode { color: var(--success); }

  </style>
</head>
<body>

  <div id="toast-container"></div>

  <div class="login-box">
    
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner" id="loaderSpinner"></div>
      <div class="loading-text" id="loaderText">VALIDANDO...</div>
    </div>

    <img src="icon.png" alt="Logo de la empresa" class="login-logo">
    
    <h1 class="login-title">Inicio de Sesión</h1>

    <input type="text" id="username" class="input-field" placeholder="Usuario" required
           onkeydown="if(event.key === 'Enter') document.getElementById('password').focus()">

    <div class="password-container">
      <input type="password" id="password" class="input-field" placeholder="Contraseña" required
             onkeydown="if(event.key === 'Enter') login()">
      <span class="toggle-password" onclick="togglePassword()">👁️</span>
    </div>

    <button class="login-btn" onclick="login()">INGRESAR</button>
  </div>

  <script>
    // URL DE TU APP SCRIPT
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3AzPzn1z_8rlAh7JAwZNHT26aVM7I-Ud2OldRKGc7VMSuYr3jLMuMAxX-NTaELFyGDg/exec"; 

    function togglePassword() {
      const passwordField = document.getElementById("password");
      passwordField.type = passwordField.type === "password" ? "text" : "password";
    }

    // Funciones visuales nuevas (Toast y Loader)
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3500);
    }

    function toggleLoader(show, text = 'VALIDANDO...', isSuccess = false) {
        const overlay = document.getElementById('loadingOverlay');
        const loaderText = document.getElementById('loaderText');
        const spinner = document.getElementById('loaderSpinner');
        
        loaderText.textContent = text;
        
        if (isSuccess) {
            spinner.classList.add('success-mode');
            loaderText.classList.add('success-mode');
        } else {
            spinner.classList.remove('success-mode');
            loaderText.classList.remove('success-mode');
        }

        if (show) overlay.classList.add('active');
        else overlay.classList.remove('active');
    }

    function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        showToast("Usuario y contraseña son obligatorios", "error");
        return;
      }

      const btn = document.querySelector(".login-btn");
      const originalText = btn.textContent;
      btn.disabled = true;
      toggleLoader(true, "AUTENTICANDO...");

      const formData = new URLSearchParams();
      formData.append('action', 'login');
      formData.append('usuario', username);
      formData.append('clave', password);

      fetch(SCRIPT_URL, {
        method: "POST",
        body: formData
      })
      .then(r => r.json())
      .then(data => {
        if (data.status !== 'success') {
          toggleLoader(false);
          showToast(data.message || "Credenciales incorrectas", "error");
          btn.disabled = false;
          return;
        }

        // ÉXITO: Cambiamos el loader a verde
        toggleLoader(true, "¡ACCESO CONCEDIDO!", true);
        
        setTimeout(() => {
            const target = new URL('inicio.html', window.location.href);
            // Backend devuelve 'k', no 'token'
            target.searchParams.set('k', data.k); 
            
            // Usamos replace para borrar historial
            window.location.replace(target.toString());
        }, 800); // 800ms de delay para ver la animación verde

      })
      .catch((e) => {
        console.error(e);
        toggleLoader(false);
        showToast("Error de conexión con el servidor", "error");
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
