<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Flota y Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root { --glass: rgba(0, 0, 0, 0.6); --glass-border: rgba(255, 255, 255, 0.1); --bg-color: #0d031a; --text-primary: #ffffff; --text-muted: rgba(255, 255, 255, 0.5); --ok: #2dd4bf; --warning: #f59e0b; --error: #ef4444; --accent: #a855f7; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', sans-serif; color: var(--text-primary); background: radial-gradient(at 0% 0%, #1e053a 0%, transparent 50%), radial-gradient(at 100% 100%, #0d031a 0%, transparent 50%); background-color: var(--bg-color); background-attachment: fixed; min-height: 100vh; padding: 20px; }
    
    /* Adapté el header para que contenga el botón de volver sin romper tu centrado */
    .header-container { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 20px auto; }
    .header-text { text-align: center; flex-grow: 1; }
    .header-text h2 { margin: 0; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px;}
    
    .config-panel { background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: 16px; padding: 15px; margin: 0 auto 30px auto; max-width: 800px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; align-items: center; }
    .config-box { display: flex; flex-direction: column; align-items: center; } .config-box label { font-size: 10px; color: var(--text-muted); font-weight: bold; margin-bottom: 5px; text-transform: uppercase; } .config-box input { background: #1a1a1a; color: white; border: 1px solid var(--glass-border); padding: 8px; border-radius: 8px; width: 100px; text-align: center; font-weight: bold; } .config-box input:focus { outline: none; border-color: var(--accent); }
    .grid-flota { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
    .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; text-align: center; }
    .card.status-ok { border-top: 4px solid var(--ok); } .card.status-warning { border-top: 4px solid var(--warning); } .card.status-error { border-top: 4px solid var(--error); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
    .card-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; width: 100%; gap: 10px; } .card-title { margin: 0; font-size: 18px; font-weight: 800; } .card-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; } .badge.ok { background: rgba(45, 212, 191, 0.1); color: var(--ok); border: 1px solid var(--ok); } .badge.warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid var(--warning); } .badge.error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 70% { box-shadow: 0 0 0 5px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
    .progress-container { background: rgba(255,255,255,0.1); border-radius: 10px; height: 12px; width: 100%; margin: 10px 0 5px 0; overflow: hidden; } .progress-bar { height: 100%; border-radius: 10px; transition: width 0.5s ease; } .progress-text { font-size: 12px; font-weight: bold; margin-bottom: 5px; width: 100%; text-align: center; } .prediction-text { font-size: 10px; color: var(--text-muted); font-style: italic; margin-bottom: 15px; width: 100%; text-align: center; }
    .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 12px; margin-bottom: 20px; width: 100%;} .data-item { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; text-align: center; } .data-label { color: var(--text-muted); font-size: 9px; text-transform: uppercase; display: block; margin-bottom: 3px;} .data-value { font-weight: 600; font-size: 14px;}
    .btn-action { width: 100%; background: transparent; border: 1px solid var(--text-muted); color: white; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; } .btn-action:hover { background: rgba(255,255,255,0.1); border-color: white; }
    
    /* Clases extra para el botón del header */
    .btn-header { width: auto; padding: 8px 15px; font-size: 12px; }
    
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; } .modal { background: #1a0b2e; border: 1px solid var(--accent); border-radius: 16px; padding: 25px; width: 90%; max-width: 350px; text-align: center; } .modal h3 { margin-top: 0; color: var(--accent); } .modal-input-group { text-align: center; margin-bottom: 15px; } .modal-input-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; } .modal-input-group input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; border-radius: 8px; font-weight: bold; text-align: center; font-size: 16px; } .modal-input-group input:focus { outline: none; border-color: var(--accent); } .modal-buttons { display: flex; gap: 10px; margin-top: 20px; } .modal-btn { flex: 1; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; } .btn-cancel { background: transparent; border: 1px solid var(--error); color: var(--error); } .btn-confirm { background: var(--ok); color: #000; }
    .loading-text { text-align: center; color: var(--accent); font-weight: bold; margin-top: 50px; animation: pulse 1.5s infinite; }
    
    /* --- ESTILOS TABLA LOGS --- */
    .log-panel { margin: 30px auto; max-width: 1000px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; backdrop-filter: blur(10px); }
    .log-panel h3 { color: var(--accent); margin-top: 0; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
    .table-wrapper { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid var(--glass-border); }
    .glass-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 11px; white-space: nowrap; }
    .glass-table th { background: rgba(255,255,255,0.05); color: var(--text-muted); padding: 12px; font-weight: 800; text-transform: uppercase; border-bottom: 1px solid var(--glass-border); }
    .glass-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); color: var(--text-primary); font-weight: 600; }
    .glass-table tbody tr:hover { background: rgba(255,255,255,0.05); }
    .tag-patente { background: rgba(168, 85, 247, 0.2); color: var(--accent); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--accent); font-weight: 800; font-size: 10px; }
  </style>
</head>
<body>

  <div class="header-container">
    <button class="btn-action btn-header" onclick="window.location.replace('inicio.html')">❮ Volver</button>
    <div class="header-text">
      <h2>Tablero de Flota</h2>
      <p style="color: var(--text-muted); font-size: 13px; margin-top: 5px;">Mantenimiento y Control de Services</p>
    </div>
    <div style="width: 80px;"></div> 
  </div>

  <div class="config-panel">
    <div class="config-box">
      <label>Alerta: Próximo (KM)</label>
      <input type="number" id="cfgProximo" value="1000" onfocus="this.select()" onchange="dibujarTarjetas()">
    </div>
    <div class="config-box">
      <label>Alerta: Realizar (KM)</label>
      <input type="number" id="cfgPeligro" value="50" onfocus="this.select()" onchange="dibujarTarjetas()">
    </div>
  </div>

<div class="grid-flota" id="flotaContainer">
    <div class="loading-text">Conectando con la base de datos... 🛰️</div>
  </div>

  <div class="log-panel" id="logPanel" style="display: none;">
    <h3>📋 Historial de Services</h3>
    <div class="table-wrapper">
      <table class="glass-table" id="tablaLogs">
        <thead>
          <tr id="logsHeaders"></tr>
        </thead>
        <tbody id="logsBody">
          <tr><td colspan="100%" style="text-align:center;">Cargando historial...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="modal-overlay" id="serviceModal">
    <div class="modal">
      <h3 id="modalTitle">🛠️ Registrar Service</h3>
      <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px;" id="modalSubtitle"></p>
      
      <div class="modal-input-group">
        <label>Fecha de Realización</label>
        <input type="date" id="modFecha">
      </div>
      <div class="modal-input-group">
        <label>KM Exactos del Tablero</label>
        <input type="number" id="modKm" onfocus="this.select()">
      </div>
      <div class="modal-input-group">
        <label>Frecuencia de Service (KM)</label>
        <input type="number" id="modFrecuencia" onfocus="this.select()">
      </div>

      <div class="modal-buttons">
        <button class="modal-btn btn-cancel" onclick="cerrarModal()">CANCELAR</button>
        <button class="modal-btn btn-confirm" id="btnGuardar" onclick="guardarServiceEnNube()">CONFIRMAR</button>
      </div>
    </div>
  </div>

  <script>
    // ========================================================
    // ⚙️ CONFIGURACIÓN CRÍTICA (¡No borrar!)
    // ========================================================
    const API = 'https://script.google.com/macros/s/AKfycbzi1x000HsPSQsWgz65jYWDWZI3cNQoKhoU5XCKagYcqs4en-d1YzO2sbnmzWlLIa9Vvw/exec'; 
    const TIMEOUT_SESION = 300000; // 5 Minutos exactos
    
    // ========================================================
    // 🕵️‍♂️ LECTURA NINJA DEL TOKEN
    // ========================================================
    const urlParams = new URLSearchParams(window.location.search);
    const urlToken = urlParams.get('k') || urlParams.get('token');
    
    // Si viene en la URL, lo guardamos en la bóveda del navegador
    if (urlToken) {
        localStorage.setItem('tokenSesion', urlToken);
    }
    
    // Recuperamos de la bóveda
    const TOKEN = localStorage.getItem('tokenSesion');

    if (!TOKEN) {
        window.location.replace('index.html');
    } else {
        // Magia: Borramos el token de la barra de direcciones para que no se vea
        if (window.history.replaceState && urlToken) {
            const urlLimpia = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({path: urlLimpia}, '', urlLimpia);
        }
    }

    // ========================================================
    // 🛡️ PATOVICA DE INACTIVIDAD
    // ========================================================
    let tIdle;
    function resetTimer() {
        clearTimeout(tIdle);
        tIdle = setTimeout(() => window.location.replace('index.html'), TIMEOUT_SESION);
    }
    ['click', 'mousemove', 'keydown', 'touchstart'].forEach(e => document.addEventListener(e, resetTimer));
    resetTimer();

    // ========================================================
    // 🚀 LÓGICA DE LA FLOTA
    // ========================================================
    let dbFlota = []; 
    let vehiculoEnEdicion = null; 

    function fmt(num) { return Number(num).toLocaleString('es-AR'); }

    // --- 1. LEER DATOS DE LA NUBE ---
    async function cargarDatos() {
      try {
        const respuesta = await fetch(`${API}?action=getflotadetalle&k=${TOKEN}`);
        const result = await respuesta.json();
        
        if (result.status === 'success') {
          dbFlota = result.data;
          dibujarTarjetas();
        } else {
          document.getElementById('flotaContainer').innerHTML = `<div class="loading-text" style="color:red;">❌ Error: ${result.message}</div>`;
        }
      } catch (error) {
        document.getElementById('flotaContainer').innerHTML = `<div class="loading-text" style="color:red;">❌ Error de conexión al servidor.</div>`;
      }
    }

    // --- 2. DIBUJAR TARJETAS (Lógica visual) ---
    function dibujarTarjetas() {
      const container = document.getElementById('flotaContainer');
      container.innerHTML = ''; 
      
      const limiteProximo = parseInt(document.getElementById('cfgProximo').value) || 500;
      const limitePeligro = parseInt(document.getElementById('cfgPeligro').value) || 50;
      const hoy = new Date(); 

      dbFlota.forEach(c => {
        const kmConsumidos = c.kmActual - c.kmUltimo;
        let kmRestantes = c.frecuencia - kmConsumidos;
        
        const fechaUltimoObj = new Date(c.fechaUltimo);
        const diasTranscurridos = Math.max(1, Math.floor((hoy - fechaUltimoObj) / (1000 * 60 * 60 * 24)));
        const kmPorDia = kmConsumidos / diasTranscurridos;
        
        let textoPrediccion = "";
        if (kmRestantes <= 0) { textoPrediccion = "⚠️ Atención requerida inmediata."; } 
        else if (kmPorDia > 0) {
            const diasFaltantes = Math.floor(kmRestantes / kmPorDia);
            const fechaEstimada = new Date();
            fechaEstimada.setDate(hoy.getDate() + diasFaltantes);
            textoPrediccion = `🗓️ Estimado: ${fechaEstimada.toLocaleDateString('es-AR')} (Aprox ${Math.round(kmPorDia)} km/día)`;
        } else { textoPrediccion = "Sin datos de movimiento para predecir."; }

        let estadoStr = "OK", claseCard = "status-ok", claseBadge = "ok", colorBarra = "var(--ok)";
        if (kmRestantes <= limitePeligro) { estadoStr = "REALIZAR SERVICE"; claseCard = "status-error"; claseBadge = "error"; colorBarra = "var(--error)"; } 
        else if (kmRestantes <= limiteProximo) { estadoStr = "PRÓXIMO A SERVICE"; claseCard = "status-warning"; claseBadge = "warning"; colorBarra = "var(--warning)"; }

        let porcentaje = Math.min(Math.max((kmConsumidos / c.frecuencia) * 100, 0), 100);
        const fechaFormateada = c.fechaUltimo ? c.fechaUltimo.split('-').reverse().join('/') : '-';

        const cardHtml = `
          <div class="card ${claseCard}">
            <div class="card-header">
              <h3 class="card-title">${c.vehiculo}</h3>
              <div class="card-subtitle">Patente: <b>${c.patente}</b></div>
              <span class="badge ${claseBadge}">${estadoStr}</span>
            </div>
            <div class="progress-container"><div class="progress-bar" style="width: ${porcentaje}%; background-color: ${colorBarra};"></div></div>
            <div class="progress-text" style="color: ${colorBarra};">${kmRestantes > 0 ? `Restan ${fmt(kmRestantes)} km` : `¡VENCIDO POR ${fmt(Math.abs(kmRestantes))} km!`}</div>
            <div class="prediction-text">${textoPrediccion}</div>
            <div class="data-grid">
              <div class="data-item"><span class="data-label">KM Actual</span><span class="data-value">${fmt(c.kmActual)}</span></div>
              <div class="data-item"><span class="data-label">Frecuencia</span><span class="data-value">${fmt(c.frecuencia)} km</span></div>
              <div class="data-item"><span class="data-label">Último Service</span><span class="data-value">${fechaFormateada}</span></div>
              <div class="data-item"><span class="data-label">KM en Service</span><span class="data-value">${fmt(c.kmUltimo)}</span></div>
            </div>
            <button class="btn-action" onclick="abrirModal('${c.patente}')">🛠️ Registrar Mantenimiento</button>
          </div>
        `;
        container.innerHTML += cardHtml;
      });
    }

    // --- 3. MODAL ---
    function abrirModal(patente) {
      const vehiculo = dbFlota.find(v => v.patente === patente);
      if(!vehiculo) return;
      vehiculoEnEdicion = patente;
      document.getElementById('modalSubtitle').innerHTML = `${vehiculo.vehiculo} (${patente})<br><b style="color:white">KM Tablero Actual: ${fmt(vehiculo.kmActual)}</b>`;
      document.getElementById('modFecha').value = new Date().toISOString().split('T')[0];
      document.getElementById('modKm').value = vehiculo.kmActual;
      document.getElementById('modFrecuencia').value = vehiculo.frecuencia;
      document.getElementById('serviceModal').style.display = 'flex';
    }

    function cerrarModal() { document.getElementById('serviceModal').style.display = 'none'; vehiculoEnEdicion = null; }

    // --- 4. GUARDAR EN LA NUBE ---
    async function guardarServiceEnNube() {
      const nuevaFecha = document.getElementById('modFecha').value;
      const nuevoKm = parseInt(document.getElementById('modKm').value);
      const nuevaFrec = parseInt(document.getElementById('modFrecuencia').value);

      if(!nuevaFecha || isNaN(nuevoKm) || isNaN(nuevaFrec)) { alert("Completá todos los campos correctamente."); return; }
      
      const vehiculo = dbFlota.find(v => v.patente === vehiculoEnEdicion);
      
      // Control de Dedazo
      if(nuevoKm < vehiculo.kmUltimo) {
          alert("❌ Error: El KM del nuevo service no puede ser menor al del último service.");
          return;
      }
      if(nuevoKm > vehiculo.kmActual + 500) { 
          if(!confirm("⚠️ El KM ingresado es llamativamente mayor al actual. ¿Estás seguro de continuar?")) return; 
      }

      if(!confirm(`⚠️ ¿Confirmás guardar ÚLTIMO SERVICE para ${vehiculoEnEdicion} a los ${fmt(nuevoKm)} km?`)) return;

      const btn = document.getElementById('btnGuardar');
      btn.innerText = "GUARDANDO...";
      btn.disabled = true;

      const payload = { action: 'saveservice', k: TOKEN, patente: vehiculoEnEdicion, fecha: nuevaFecha, km: nuevoKm, frecuencia: nuevaFrec };

      try {
        const req = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams(payload)
        });
        const res = await req.json();

       if(res.status === 'success') {
          cerrarModal();
          cargarDatos(); // Recargar tarjetas
          cargarLogs();  // Recargar tabla de historial automáticamente
        } else { alert("Error al guardar: " + res.message); }
      } catch (err) { alert("Error de red."); }
      
      btn.innerText = "CONFIRMAR";
      btn.disabled = false;
    }

// --- 5. LÓGICA DE HISTORIAL (LOGS) ---
    async function cargarLogs() {
      try {
        document.getElementById('logPanel').style.display = 'block';
        const respuesta = await fetch(`${API}?action=getlogservices&k=${TOKEN}`);
        const result = await respuesta.json();
        
        if (result.status === 'success') {
          dibujarTablaLogs(result.data);
        } else {
          document.getElementById('logsBody').innerHTML = `<tr><td colspan="100%" style="color:var(--error); text-align:center;">Error: ${result.message}</td></tr>`;
        }
      } catch (e) {
        document.getElementById('logsBody').innerHTML = `<tr><td colspan="100%" style="color:var(--error); text-align:center;">Error de conexión al obtener historial.</td></tr>`;
      }
    }

    function dibujarTablaLogs(data) {
      const tbody = document.getElementById('logsBody');
      const thead = document.getElementById('logsHeaders');
      
      if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="100%" style="text-align:center; color:var(--text-muted);">No hay historial de services registrado.</td></tr>`;
        return;
      }

      const columnas = Object.keys(data[0]);
      thead.innerHTML = columnas.map(col => `<th>${col}</th>`).join('');

      let htmlFilas = '';
      data.forEach(fila => {
        htmlFilas += '<tr>';
        columnas.forEach(col => {
          let valor = fila[col];
          // Formateo cosmético si detecta Patentes o números grandes (KMs)
          if (col.toUpperCase() === 'PATENTE') {
            valor = `<span class="tag-patente">${valor}</span>`;
          } else if (!isNaN(valor) && valor !== '' && valor > 1000) {
            valor = fmt(valor); 
          }
          htmlFilas += `<td>${valor}</td>`;
        });
        htmlFilas += '</tr>';
      });
      tbody.innerHTML = htmlFilas;
    }

    // Arranque
    window.onload = () => {
      cargarDatos();
      cargarLogs();
    };
  </script>
</body>
</html>
