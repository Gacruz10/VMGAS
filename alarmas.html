<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<title>Gestión de Alarmas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --glass: rgba(0, 0, 0, 0.5);
    --glass-border: rgba(255, 255, 255, 0.15);
    --text-primary: #ffffff;
    --text-muted: rgba(255, 255, 255, 0.6);
    --accent: #FFD700;
    --chip-ok: #2dd4bf;
    --chip-bad: #f97316;
    --btn-bg: rgba(255, 255, 255, 0.1);
  }

  *{box-sizing:border-box}

  body{
    margin:0; 
    font-family: 'Inter', sans-serif;
    background: radial-gradient(at 0% 0%, #1e053a 0%, transparent 50%),
                radial-gradient(at 100% 0%, #310d5e 0%, transparent 50%),
                radial-gradient(at 100% 100%, #0d031a 0%, transparent 50%),
                radial-gradient(at 0% 100%, #214d7a 0%, transparent 50%);
    background-color: #0d031a;
    background-attachment: fixed;
    color: var(--text-primary);
    min-height: 100vh;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .wrap{ max-width: 900px; margin: 0 auto; padding: 30px 20px 80px; }
  h1{ font-size: clamp(24px, 4vw, 36px); text-align: center; margin: 0 0 10px; font-weight: 800; letter-spacing: -1px; }
  .sub{ color: var(--text-muted); text-align: center; font-size: 14px; margin-bottom: 30px; }
  .actions{ display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }
  .btn{ border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px 24px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; background: var(--btn-bg); color: white; backdrop-filter: blur(5px); transition: all 0.3s ease; }
  .btn:hover { background: var(--accent); color: #000; transform: translateY(-2px); border-color: var(--accent); box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }
  
  .list{ display: grid; grid-template-columns: 1fr; gap: 20px; }
  @media(min-width: 768px) { .list { grid-template-columns: 1fr 1fr; } }
  
  .item{ background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 15px; transition: transform 0.2s ease; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; font-size: 13px; color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 5px; }
  .card-type { font-weight: 700; color: var(--accent); text-transform: uppercase; }
  .msg { font-size: 15px; line-height: 1.5; color: rgba(255,255,255,0.9); flex-grow: 1; }
  
  .card-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
  .footer-left { display: flex; flex-direction: column; gap: 8px; }
  
  .user-info { font-size: 12px; color: var(--text-muted); font-style: italic; display: flex; align-items: center; gap: 5px; }
  
  .chip{ font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 99px; text-transform: uppercase; width: fit-content; }
  .ok { background: rgba(45, 212, 191, 0.2); color: var(--chip-ok); border: 1px solid var(--chip-ok); }
  .bad{ background: rgba(249, 115, 22, 0.2); color: var(--chip-bad); border: 1px solid var(--chip-bad); }
  
  .state{ display: flex; align-items: center; gap: 10px; font-size: 13px; cursor: pointer; background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 8px; }
  input[type="checkbox"]{ width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
  .empty{ text-align:center; color: var(--text-muted); margin-top:40px; }

  /* --- SISTEMA DE TOASTS --- */
  #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
  .toast { padding: 15px 20px; border-radius: 12px; color: #fff; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--glass-border); opacity: 0; transform: translateY(20px); transition: all 0.3s ease; font-size: 14px; letter-spacing: 0.5px;}
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.error { background: rgba(255, 68, 68, 0.9); backdrop-filter: blur(10px); }
  .toast.success { background: rgba(45, 212, 191, 0.9); backdrop-filter: blur(10px); }
  .toast.info { background: rgba(255, 215, 0, 0.9); color: #000; backdrop-filter: blur(10px); }

  /* --- ANIMACIÓN DE CARGA (OVERLAY) --- */
  .loading-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(13, 3, 26, 0.9); z-index: 9999; display: flex; flex-direction: column;
    justify-content: center; align-items: center; 
    opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .loading-overlay.active { opacity: 1; visibility: visible; }
  
  .spinner {
    width: 60px; height: 60px; border: 4px solid rgba(255, 215, 0, 0.1);
    border-left-color: var(--accent); border-radius: 50%;
    animation: spin 1s linear infinite, pulseGlow 2s ease-in-out infinite;
    margin-bottom: 20px; transition: all 0.3s ease;
  }
  .spinner.success-mode { border-left-color: var(--chip-ok); }
  
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  @keyframes pulseGlow { 0% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); } 50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.4); } 100% { box-shadow: 0 0 10px rgba(255, 215, 0, 0.1); } }

  .loading-text { color: var(--accent); font-size: 15px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; transition: color 0.3s; }
  .loading-text.success-mode { color: var(--chip-ok); }

</style>
</head>
<body>

  <div id="toast-container"></div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner" id="loaderSpinner"></div>
    <div class="loading-text" id="loaderText">CARGANDO...</div>
  </div>

  <div class="wrap">
    <h1>GESTIÓN DE ALARMAS</h1>
    <div class="sub" id="statusHeader">Visualizando historial...</div>
    <div class="actions">
      <button class="btn" id="btnGuardar">Guardar Cambios</button>
      <button class="btn" id="btnRefresh">Refrescar</button>
      <button class="btn" id="btnBack">Volver</button>
    </div>
    <div id="list" class="list"></div>
    <div id="empty" class="empty" style="display:none">No hay alarmas pendientes.</div>
  </div>

<script>
// --- PROTOCOLO DE SEGURIDAD (VETERINARIO) ---
const API = "https://script.google.com/macros/s/AKfycbzi1x000HsPSQsWgz65jYWDWZI3cNQoKhoU5XCKagYcqs4en-d1YzO2sbnmzWlLIa9Vvw/exec";
const TIMEOUT_SESION = 300000; // 5 minutos

// Funciones visuales (Toast y Loader)
function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = msg;
    container.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3500);
}

function toggleLoader(show, text = 'CARGANDO...', isSuccess = false) {
    const overlay = document.getElementById('loadingOverlay');
    const loaderText = document.getElementById('loaderText');
    const spinner = document.getElementById('loaderSpinner');
    
    loaderText.textContent = text;
    
    if (isSuccess) {
        spinner.classList.add('success-mode');
        loaderText.classList.add('success-mode');
    } else {
        spinner.classList.remove('success-mode');
        loaderText.classList.remove('success-mode');
    }

    if (show) overlay.classList.add('active');
    else overlay.classList.remove('active');
}

// 1. DETECTOR DE "ATRÁS"
window.addEventListener('pageshow', (e) => { 
    if (e.persisted || (window.performance && window.performance.navigation.type === 2)) window.location.reload(); 
});

// 2. OBTENER Y VALIDAR K
const params = new URLSearchParams(window.location.search);
const k = params.get('k') || params.get('token');

function expulsar() { 
    sessionStorage.clear(); 
    window.location.replace('index.html'); 
}

if (!k) {
    expulsar();
} else {
    // Limpieza URL
    if (window.history.replaceState) {
       window.history.replaceState({}, document.title, window.location.pathname);
    }
    validarSesion();
}

async function validarSesion() {
  try {
    document.body.style.opacity = 1;
    toggleLoader(true, "VERIFICANDO SESIÓN...");

    const fd = new FormData();
    fd.append('action', 'verificarsesion');
    fd.append('k', k); // Enviamos K
    const r = await fetch(API, { method: 'POST', body: fd });
    const d = await r.json();
    if (d.status !== 'success') throw new Error();
    
    load(); // Cargar datos tras validar
  } catch (e) { expulsar(); }
}

// 3. INACTIVIDAD (5 MIN)
let tIdle;
function resetTimer() { 
    clearTimeout(tIdle); 
    tIdle = setTimeout(expulsar, TIMEOUT_SESION); 
}
['click','mousemove','keydown','touchstart'].forEach(ev => document.addEventListener(ev, resetTimer));
resetTimer();

// 4. VOLVER SEGURO
document.getElementById('btnBack').onclick = () => { 
    window.location.replace(`inicio.html?k=${k}`); 
};
// ---------------------------------------------

let alarms = [];
let localStates = new Map();

// Formateo de fecha y hora robusto
const fmt = (d, t) => {
  try {
    const formatDate = (x) => {
      if (!x) return '';
      if (String(x).includes('T')) { const dt = new Date(x); return dt.toLocaleDateString('es-AR'); }
      return x;
    };
    const formatTime = (x) => {
      if (!x) return '';
      if (String(x).includes('T')) { const dt = new Date(x); return dt.toTimeString().slice(0, 5); }
      return x;
    };
    return `${formatDate(d)} ${formatTime(t)}`;
  } catch { return `${d || ''} ${t || ''}`; }
};

function render(){
  const listEl = document.getElementById('list');
  listEl.innerHTML = '';
  if (!alarms.length){ document.getElementById('empty').style.display='block'; return; }
  document.getElementById('empty').style.display='none';

  alarms.forEach(a=>{
    const pending = localStates.has(a.row) ? localStates.get(a.row) : !!a.pendiente;
    const chipText = pending ? 'Pendiente' : 'Revisado';
    
    // Asegurarnos que el usuario se vea
    const user = (a.usuario && String(a.usuario).trim()) ? String(a.usuario).trim() : 'Sin usuario';

    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <div class="card-header">
        <span class="card-type">${(a.tipo||'ALERTA')}</span>
        <span>${fmt(a.fecha, a.hora)}</span>
      </div>
      <div class="msg">${a.descripcion||''}</div>
      <div class="card-footer">
        <div class="footer-left">
           <div class="user-info">👤 ${user}</div>
           <span class="chip ${pending?'bad':'ok'}" data-chip="${a.row}">${chipText}</span>
        </div>
        <label class="state">
          <span>Marcar</span>
          <input type="checkbox" ${!pending?'checked':''} data-row="${a.row}">
        </label>
      </div>`;
    listEl.appendChild(div);
  });

  listEl.querySelectorAll('input[type="checkbox"]').forEach(chk=>{
    chk.onchange = (e) => {
      const row = Number(e.target.dataset.row);
      const isPending = !e.target.checked;
      localStates.set(row, isPending);
      const chip = document.querySelector(`.chip[data-chip="${row}"]`);
      chip.textContent = isPending ? 'Pendiente' : 'Revisado';
      chip.className = `chip ${isPending?'bad':'ok'}`;
    };
  });
}

async function load(){
  try{
    toggleLoader(true, "OBTENIENDO ALARMAS...");
    const url = `${API}?action=listalarmas&limit=50&k=${k}`;
    const r = await fetch(url);
    const j = await r.json();
    
    if(j.status === 'success'){
      alarms = j.alarmas || [];
      localStates.clear();
      alarms.forEach(a => localStates.set(a.row, !!a.pendiente));
      render();
      document.getElementById('statusHeader').textContent = "Últimas 50 alarmas";
      toggleLoader(false);
    } else { throw new Error(); }
  } catch(e){ 
      toggleLoader(false);
      document.getElementById('statusHeader').textContent = "Error al cargar alarmas."; 
      showToast('Error de conexión al cargar alarmas', 'error');
  }
}

async function save(){
  try{
    const btn = document.getElementById('btnGuardar');
    btn.disabled = true; 
    
    toggleLoader(true, "GUARDANDO CAMBIOS...");
    
    const rowsToSend = [];
    localStates.forEach((val, key) => { rowsToSend.push({ row: key, pendiente: val ? 1 : 0 }); });

    const fd = new FormData();
    fd.append('action', 'savealarmas'); 
    fd.append('k', k); // Enviamos K
    fd.append('rows', JSON.stringify(rowsToSend));

    const r = await fetch(API, { method: 'POST', body: fd });
    const j = await r.json();
    if(j.status === 'success'){
      
      toggleLoader(true, "¡CAMBIOS GUARDADOS!", true);
      
      // 🔥 CAMBIO AQUÍ: Redirigir al inicio tras 1 segundo
      setTimeout(() => {
          window.location.replace(`inicio.html?k=${k}`);
      }, 1000);
      
    } else { throw new Error(j.message || "Error del servidor"); }
  } catch(e){ 
      toggleLoader(false);
      showToast("Error al guardar: " + e.message, 'error'); 
      document.getElementById('btnGuardar').disabled = false;
  }
}

document.getElementById('btnRefresh').onclick = load;
document.getElementById('btnGuardar').onclick = save;

</script>
</body>
</html>
